name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  COVERAGE_THRESHOLD: 75  # Minimum % required to pass (raised from initial 0% baseline as suites grow; current ~79%)

jobs:
  # ─── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DungeonGame.sln

      - name: Build (game only — no Godot needed)
        run: dotnet build DungeonGame.csproj --no-restore --configuration Release

  # ─── Job 2: Unit Tests ───────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore tests/unit/DungeonGame.Tests.Unit.csproj

      - name: Run unit tests with coverage
        run: |
          dotnet test tests/unit/DungeonGame.Tests.Unit.csproj \
            --no-restore \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage/unit

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: ./coverage/unit

  # ─── Job 3: Integration Tests ────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore tests/integration/DungeonGame.Tests.Integration.csproj

      - name: Run integration tests
        # No coverage collection here: integration tests cover cross-system flows
        # but compile the same logic source as the unit tests, so collecting their
        # coverage double-counts the same production lines and dilutes the metric.
        # The unit-tests job's coverage report is the source of truth for the gate.
        run: |
          dotnet test tests/integration/DungeonGame.Tests.Integration.csproj \
            --no-restore \
            --verbosity normal

  # ─── Job 4: Coverage Gate ────────────────────────────────────────────────────
  coverage-check:
    # Threshold value is sourced from env.COVERAGE_THRESHOLD inside the run step.
    # Don't interpolate ${{ env.X }} into job name — the env context isn't
    # allowed at job-name scope and GitHub silently rejects the workflow.
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: ./coverage/unit

      - name: Generate coverage report
        # Only the unit-tests job emits coverage now (see unit-tests step + the
        # rationale in integration-tests). +DungeonGame.Tests.Unit is a strict
        # filter so the report can't accidentally pick up duplicate-source
        # coverage from another assembly should one be added later.
        run: |
          reportgenerator \
            -reports:"./coverage/unit/**/*.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"TextSummary;Html" \
            -assemblyfilters:"+DungeonGame.Tests.Unit"

      - name: Check coverage threshold
        run: |
          SUMMARY=$(cat ./coverage/report/Summary.txt)
          echo "$SUMMARY"
          LINE_COVERAGE=$(echo "$SUMMARY" | grep "Line coverage" | grep -oE '[0-9]+\.[0-9]+')
          echo "Line coverage: $LINE_COVERAGE%"
          if (( $(echo "$LINE_COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Coverage $LINE_COVERAGE% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "✅ Coverage $LINE_COVERAGE% meets threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report

  # ─── Job 5: UI Tests — GoDotTest keyboard-nav suite ─────────────────────────
  # Runs on every PR and push. Covers the keyboard-nav in-game UI tests launched
  # via `make test-ui` (Main.cs boots them via --run-tests when the flag is set).
  ui-tests:
    name: UI Tests (GoDotTest keyboard-nav)
    runs-on: ubuntu-latest
    needs: coverage-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Godot (mono/.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: true

      - name: Restore + Build
        run: |
          dotnet restore DungeonGame.csproj
          dotnet build DungeonGame.csproj --no-restore

      - name: Rebuild Godot import cache
        run: godot --path ./ -e --headless --quit-after 2000

      - name: Run GoDotTest UI suite
        run: |
          godot --headless --path . --run-tests --quit-on-finish 2>&1 | tee ui-tests.log
          # Fail the job if any test failed (GoDotTest reports "✗" for failures).
          if grep -q "✗" ui-tests.log; then
            echo "❌ GoDotTest UI suite reported failures"
            exit 1
          fi
          echo "✅ GoDotTest UI suite passed"

      - name: Upload UI test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-log
          path: ui-tests.log

  # ─── Job 6: E2E / GdUnit4 Scene Tests (main push only) ──────────────────────
  e2e-tests:
    name: E2E / GdUnit4 Scene Tests
    runs-on: ubuntu-latest
    needs: coverage-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Godot (mono/.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: true

      - name: Restore dependencies
        run: dotnet restore tests/e2e/DungeonGame.Tests.E2E.csproj

      - name: Rebuild Godot import cache
        run: godot --path ./ -e --headless --quit-after 2000

      - name: Run GdUnit4 E2E tests (headless)
        run: |
          dotnet test tests/e2e/DungeonGame.Tests.E2E.csproj \
            --no-restore \
            --settings .runsettings-ci \
            --verbosity normal \
            -m:1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: TestResults/

  # ─── Job 7: Sandbox Headless Checks (main push only) ─────────────────────────
  sandbox-checks:
    name: Sandbox Headless Checks
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Godot (mono/.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: true

      - name: Build
        run: dotnet build DungeonGame.csproj

      - name: Rebuild Godot import cache
        run: godot --path ./ -e --headless --quit-after 2000

      - name: Run all sandbox headless checks
        run: |
          for scene in floor-gen inventory loot-table bank death-penalty; do
            echo "── Sandbox: $scene ──"
            godot --headless --path . \
              --main-scene "res://scenes/sandbox/systems/${scene}.tscn" \
              --quit-after 10 2>&1 || true
          done


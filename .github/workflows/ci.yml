name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install gdtoolkit
      - name: Lint
        run: |
          if find scripts/ scenes/ -name '*.gd' 2>/dev/null | head -1 | grep -q .; then
            gdlint scripts/ scenes/
            gdformat --check scripts/ scenes/
          else
            echo "No .gd files to lint yet."
          fi

  test:
    name: GUT Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 2

      - name: Run tests
        run: |
          if find tests/ -name 'test_*.gd' 2>/dev/null | head -1 | grep -q .; then
            godot --headless -s addons/gut/gut_cmdln.gd -gdir=res://tests/ -gexit
          else
            echo "No test files yet."
          fi
        timeout-minutes: 5

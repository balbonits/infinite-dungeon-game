<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>A Dungeon in the Middle of Nowhere</title>
  <style>
    :root {
      --bg-0: #0f1117;
      --bg-1: #1b2130;
      --ink: #ecf0ff;
      --muted: #b6bfdb;
      --accent: #f5c86b;
      --danger: #ff6f6f;
      --safe: #76f79f;
      --panel: rgba(22, 27, 40, 0.75);
      --panel-border: rgba(245, 200, 107, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #2a3550 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, #3d2d1f 0%, transparent 35%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1));
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #app {
      position: relative;
      width: min(1100px, 100vw);
      height: min(700px, 100vh);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      background: rgba(0, 0, 0, 0.25);
    }

    #overlay {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 5;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(5px);
      pointer-events: none;
      min-width: 200px;
    }

    #overlay h1 {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: var(--accent);
      font-weight: 700;
    }

    #overlay p {
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    #hud {
      margin-top: 6px;
      color: var(--ink);
    }

    .mobile-note {
      display: none;
    }

    @media (max-width: 900px) {
      #app {
        width: 100vw;
        height: 100vh;
        border: 0;
        border-radius: 0;
      }

      #overlay {
        left: 8px;
        right: 8px;
        top: 8px;
      }

      .mobile-note {
        display: inline;
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Game container">
    <section id="overlay" aria-live="polite">
      <h1>A Dungeon in the Middle of Nowhere</h1>
      <p>Move: WASD / Arrow keys</p>
      <p>Auto-attack: nearest enemy in range</p>
      <p class="mobile-note">Mobile: drag anywhere to move</p>
      <p id="hud">HP: -- | XP: -- | Floor: 1</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
    (function () {
      const GAME_WIDTH = 1100;
      const GAME_HEIGHT = 700;
      const FLOOR_NUMBER = 1;

      const COLORS = {
        bgGrid: 0x24314a,
        player: 0x8ed6ff,
        enemyLow: 0x6bff89,
        enemyMid: 0xffde66,
        enemyHigh: 0xff6f6f,
        sword: 0xf5c86b
      };

      const state = {
        hp: 100,
        xp: 0,
        level: 1
      };

      const app = document.getElementById("app");
      const hud = document.getElementById("hud");

      class DungeonScene extends Phaser.Scene {
        constructor() {
          super("dungeon");
          this.player = null;
          this.enemies = null;
          this.cursors = null;
          this.keys = null;
          this.movePointer = null;
          this.lastAttackAt = 0;
        }

        preload() {}

        create() {
          state.hp = 100;
          state.xp = 0;
          state.level = 1;

          this.createBackground();

          this.player = this.add.circle(GAME_WIDTH / 2, GAME_HEIGHT / 2, 12, COLORS.player);
          this.physics.add.existing(this.player);
          this.player.body.setMaxVelocity(220, 220);
          this.player.setCollideWorldBounds(true);

          this.enemies = this.physics.add.group();
          for (let i = 0; i < 10; i += 1) {
            this.spawnEnemy();
          }

          this.cursors = this.input.keyboard.createCursorKeys();
          this.keys = this.input.keyboard.addKeys("W,A,S,D");

          this.physics.add.overlap(this.player, this.enemies, this.onPlayerHit, null, this);

          this.input.on("pointerdown", (pointer) => {
            this.movePointer = pointer;
          });

          this.input.on("pointerup", () => {
            this.movePointer = null;
          });

          this.input.on("pointerupoutside", () => {
            this.movePointer = null;
          });

          this.time.addEvent({
            delay: 2800,
            loop: true,
            callback: () => {
              if (this.enemies.countActive(true) < 14) {
                this.spawnEnemy();
              }
            }
          });

          this.updateHud();
        }

        update(time) {
          if (!this.player.active) {
            return;
          }

          this.handleMovement();
          this.handleEnemyAI();
          this.tryAutoAttack(time);
        }

        createBackground() {
          const g = this.add.graphics();
          g.fillStyle(0x131927, 1);
          g.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          g.lineStyle(1, COLORS.bgGrid, 0.25);
          for (let x = 0; x < GAME_WIDTH; x += 50) {
            g.moveTo(x, 0);
            g.lineTo(x, GAME_HEIGHT);
          }
          for (let y = 0; y < GAME_HEIGHT; y += 50) {
            g.moveTo(0, y);
            g.lineTo(GAME_WIDTH, y);
          }
          g.strokePath();

          this.physics.world.setBounds(0, 0, GAME_WIDTH, GAME_HEIGHT);
        }

        spawnEnemy() {
          const edge = Phaser.Math.Between(0, 3);
          let x = 0;
          let y = 0;

          if (edge === 0) {
            x = Phaser.Math.Between(0, GAME_WIDTH);
            y = 10;
          } else if (edge === 1) {
            x = GAME_WIDTH - 10;
            y = Phaser.Math.Between(0, GAME_HEIGHT);
          } else if (edge === 2) {
            x = Phaser.Math.Between(0, GAME_WIDTH);
            y = GAME_HEIGHT - 10;
          } else {
            x = 10;
            y = Phaser.Math.Between(0, GAME_HEIGHT);
          }

          const dangerTier = Phaser.Math.Between(1, 3);
          const hp = 18 + dangerTier * 12;
          const speed = 48 + dangerTier * 18;

          let tint = COLORS.enemyLow;
          if (dangerTier === 2) tint = COLORS.enemyMid;
          if (dangerTier === 3) tint = COLORS.enemyHigh;

          const enemy = this.add.circle(x, y, 10, tint);
          this.physics.add.existing(enemy);
          enemy.hp = hp;
          enemy.speed = speed;
          enemy.dangerTier = dangerTier;
          enemy.lastHitAt = 0;

          this.enemies.add(enemy);
        }

        handleMovement() {
          const body = this.player.body;
          body.setVelocity(0, 0);

          const left = this.cursors.left.isDown || this.keys.A.isDown;
          const right = this.cursors.right.isDown || this.keys.D.isDown;
          const up = this.cursors.up.isDown || this.keys.W.isDown;
          const down = this.cursors.down.isDown || this.keys.S.isDown;

          let vx = 0;
          let vy = 0;

          if (left) vx -= 1;
          if (right) vx += 1;
          if (up) vy -= 1;
          if (down) vy += 1;

          if (this.movePointer && this.movePointer.isDown) {
            const dx = this.movePointer.worldX - this.player.x;
            const dy = this.movePointer.worldY - this.player.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 12) {
              vx = dx / dist;
              vy = dy / dist;
            }
          }

          if (vx !== 0 || vy !== 0) {
            const normalized = new Phaser.Math.Vector2(vx, vy).normalize().scale(190);
            body.setVelocity(normalized.x, normalized.y);
          }
        }

        handleEnemyAI() {
          this.enemies.children.iterate((enemy) => {
            if (!enemy || !enemy.active) return;
            this.physics.moveToObject(enemy, this.player, enemy.speed);
          });
        }

        tryAutoAttack(time) {
          const ATTACK_COOLDOWN = 420;
          const ATTACK_RANGE = 78;

          if (time - this.lastAttackAt < ATTACK_COOLDOWN) {
            return;
          }

          let bestEnemy = null;
          let bestDistance = Number.POSITIVE_INFINITY;

          this.enemies.children.iterate((enemy) => {
            if (!enemy || !enemy.active) return;
            const distance = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
            if (distance < ATTACK_RANGE && distance < bestDistance) {
              bestDistance = distance;
              bestEnemy = enemy;
            }
          });

          if (!bestEnemy) {
            return;
          }

          this.lastAttackAt = time;
          const damage = 12 + Math.floor(state.level * 1.5);
          bestEnemy.hp -= damage;

          this.drawSlash(bestEnemy.x, bestEnemy.y);

          if (bestEnemy.hp <= 0) {
            this.defeatEnemy(bestEnemy);
          }
        }

        drawSlash(x, y) {
          const slash = this.add.rectangle(x, y, 26, 4, COLORS.sword, 0.95);
          slash.rotation = Phaser.Math.FloatBetween(-1.2, 1.2);
          this.tweens.add({
            targets: slash,
            alpha: 0,
            y: y - 8,
            duration: 120,
            onComplete: () => slash.destroy()
          });
        }

        defeatEnemy(enemy) {
          enemy.disableBody(true, true);
          state.xp += 10 + enemy.dangerTier * 4;

          const xpToLevel = state.level * 90;
          if (state.xp >= xpToLevel) {
            state.xp -= xpToLevel;
            state.level += 1;
            state.hp = Math.min(100 + state.level * 8, state.hp + 18);
          }

          this.updateHud();

          this.time.delayedCall(1400, () => {
            if (!this.scene.isActive()) return;
            this.spawnEnemy();
          });
        }

        onPlayerHit(player, enemy) {
          const now = this.time.now;
          if (now - enemy.lastHitAt < 700) {
            return;
          }

          enemy.lastHitAt = now;
          state.hp -= 3 + enemy.dangerTier;
          this.cameras.main.shake(90, 0.0035);
          this.updateHud();

          if (state.hp <= 0) {
            state.hp = 0;
            this.updateHud();
            this.gameOver();
          }
        }

        gameOver() {
          this.player.disableBody(true, true);
          this.enemies.children.iterate((enemy) => {
            if (enemy && enemy.active) {
              enemy.setVelocity(0, 0);
            }
          });

          const panel = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, 380, 160, 0x000000, 0.75);
          const text = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2, "You Died\nTap / Press R to restart", {
            fontFamily: "Trebuchet MS",
            fontSize: "28px",
            color: "#ffe1b0",
            align: "center"
          });
          text.setOrigin(0.5);

          this.input.keyboard.once("keydown-R", () => this.scene.restart());
          this.input.once("pointerdown", () => this.scene.restart());
        }

        updateHud() {
          hud.textContent = `HP: ${state.hp} | XP: ${state.xp} | LVL: ${state.level} | Floor: ${FLOOR_NUMBER}`;
        }
      }

      const game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: "app",
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        backgroundColor: "#111827",
        physics: {
          default: "arcade",
          arcade: {
            debug: false
          }
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [DungeonScene]
      });

      // Keep a global reference for easier debugging from browser devtools.
      window.__dungeonGame = game;
    })();
  </script>
</body>
</html>
